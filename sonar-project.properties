# SonarQube project configuration for this frontend codebase

# --- Project identification ---
# Adjust projectKey to match your SonarQube project key/slug
sonar.projectKey=PR-1608-WorkerSolutions-Frontend-ReactJs
sonar.projectName=PR-1608-WorkerSolutions-Frontend-ReactJs
sonar.projectVersion=0.0.0

# --- General settings ---
sonar.sourceEncoding=UTF-8
sonar.branch.name=develop1

# --- Paths ---
# Application source code
sonar.sources=src

# Test code (unit/integration tests)
sonar.tests=tests

# Exclude build artifacts, configuration, and non-source folders if they ever appear
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.git/**,**/coverage/**,public/**,specs/**,__MACOSX/**

# Test file patterns (adjust if you add more conventions)
sonar.test.inclusions=tests/**/*.test.ts,tests/**/*.test.tsx,tests/**/*.spec.ts,tests/**/*.spec.tsx

# --- Language-specific settings ---
# SonarQube auto-detects JS/TS, but these hints help with TS projects
sonar.typescript.tsconfigPath=tsconfig.json

# If/when you enable coverage reports (e.g., from Vitest/Jest),
# point SonarQube to the LCOV report path and remove the leading '#':
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
# sonar.typescript.lcov.reportPaths=coverage/lcov.info
